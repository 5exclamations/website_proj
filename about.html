<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAC Azerbaijan | About us</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="about">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">BAC Azerbaijan</a>
        <nav class="main-nav" id="main-nav"></nav>
        <div class="lang-switch" aria-label="Language switcher">
          <button data-lang="az">AZ</button>
          <button data-lang="en">EN</button>
          <button data-lang="ru">RU</button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1 id="about-title"></h1>
        <p id="about-intro"></p>

        <div class="two-cols">
          <div class="card">
            <h2 id="education-title"></h2>
            <ul id="education-list"></ul>
          </div>
          <div class="card">
            <h2 id="experience-title"></h2>
            <ul id="experience-list"></ul>
          </div>
        </div>

        <div class="stats" id="about-stats"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p id="footer-copy"></p>
        <div class="footer-links" id="footer-links"></div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
