<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAC Azerbaijan | Home</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">BAC Azerbaijan</a>
        <nav class="main-nav" id="main-nav"></nav>
        <div class="lang-switch" aria-label="Language switcher">
          <button data-lang="az">AZ</button>
          <button data-lang="en">EN</button>
          <button data-lang="ru">RU</button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-grid">
          <div>
            <p class="eyebrow" id="hero-eyebrow"></p>
            <h1 id="hero-title"></h1>
            <h2 id="hero-subtitle" class="subtitle"></h2>
            <p id="hero-text"></p>
            <div class="hero-actions">
              <a class="btn btn-primary" href="contact.html" id="hero-cta"></a>
              <a class="btn btn-ghost" href="about.html" id="hero-more"></a>
            </div>
          </div>
          <div class="image-frame">
            <img id="hero-image" alt="Doctor" />
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container section-head">
          <h2 id="approach-title"></h2>
          <p id="approach-text"></p>
        </div>

        <div class="container feature-grid">
          <div class="image-frame soft">
            <img id="approach-image" alt="Neuropsychology and technology" />
          </div>
          <div>
            <h3 id="approach-detail-title"></h3>
            <p id="approach-detail-text"></p>
          </div>
        </div>

        <div class="container feature-grid reverse">
          <div>
            <h3 id="integration-title"></h3>
            <p id="integration-text"></p>
            <div class="hero-actions">
              <a class="btn btn-ghost" href="about.html" id="integration-more"></a>
              <a class="btn btn-primary" href="contact.html" id="integration-cta"></a>
            </div>
          </div>
          <div class="image-frame soft">
            <img id="integration-image" alt="BAC integration" />
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container section-head">
          <h2 id="what-title"></h2>
          <p id="what-subtitle"></p>
        </div>
        <div class="container">
          <div class="image-frame wide">
            <img id="what-image" alt="What is BAC therapy" />
          </div>
          <p id="what-text"></p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <h2 id="how-title"></h2>
          <div class="steps" id="how-steps"></div>
        </div>
      </section>

      <section class="section alt">
        <div class="container cta-box">
          <div>
            <h2 id="transform-title"></h2>
            <p id="transform-text"></p>
          </div>
          <a class="btn btn-primary" href="contact.html" id="transform-cta"></a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p id="footer-copy"></p>
        <div class="footer-links" id="footer-links"></div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
