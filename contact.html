<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAC Azerbaijan | Contact</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="contact" class="contact-page">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html"><img src="img/logo.png" alt="Vusala Gasimova" /></a>
        <nav class="main-nav" id="main-nav"></nav>
        <div class="nav-right">
          <div class="lang-switch" aria-label="Language switcher">
            <button data-lang="az">AZ</button>
            <button data-lang="en">EN</button>
            <button data-lang="ru">RU</button>
          </div>
          <a class="btn btn-primary book-appointment-trigger" href="#" id="nav-book">Book Appointment</a>
        </div>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container two-cols contact-grid">
          <div>
            <h1 id="contact-title"></h1>
            <p id="contact-intro"></p>
            <p><strong id="contact-phone-label"></strong> +994 55 477 02 66</p>
            <p><strong id="contact-address-label"></strong> Aşıq Molla Cümə 3, Baku 1075, Azerbaijan</p>
            <p id="contact-note"></p>

            <div class="map-card">
              <h3 id="contact-location-title"></h3>
              <div class="map-frame">
                <iframe
                  src="https://www.google.com/maps?q=A%C5%9F%C4%B1q%20Molla%20C%C3%BCm%C9%99%203,%20Baku%201075,%20Azerbaijan&output=embed"
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  title="BAC Azerbaijan location"
                ></iframe>
              </div>
              <a class="btn btn-ghost" id="contact-map-link" href="https://maps.app.goo.gl/SyPMxCkYc1H4ZJ5g7" target="_blank" rel="noopener"></a>
              <div class="contact-socials">
                <a id="contact-instagram-link" href="https://instagram.com/" target="_blank" rel="noopener"></a>
                <a id="contact-whatsapp-link" href="https://wa.me/994554770266" target="_blank" rel="noopener"></a>
              </div>
            </div>
          </div>

          <form class="card form">
            <label id="label-name"></label>
            <input type="text" />
            <label id="label-number"></label>
            <input type="text" />
            <label id="label-question"></label>
            <textarea rows="4"></textarea>
            <button type="button" class="btn btn-primary" id="send-btn"></button>
          </form>
        </div>

      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p id="footer-copy"></p>
        <div class="footer-links" id="footer-links"></div>
      </div>
    </footer>

    <div class="booking-modal" id="booking-modal" aria-hidden="true">
      <div class="booking-backdrop" data-close-booking></div>
      <div class="booking-dialog" role="dialog" aria-modal="true" aria-labelledby="booking-title">
        <button class="booking-close" type="button" data-close-booking aria-label="Close">&times;</button>
        <h3 id="booking-title">Book Appointment</h3>
        <p id="booking-subtitle">Please leave your details and we will contact you.</p>
        <form class="booking-form">
          <label for="booking-name" id="booking-name-label">Your name, surname</label>
          <input id="booking-name" type="text" />
          <label for="booking-phone" id="booking-phone-label">Your number</label>
          <input id="booking-phone" type="text" />
          <label for="booking-question" id="booking-question-label">Your question</label>
          <textarea id="booking-question" rows="4"></textarea>
          <button type="button" class="btn btn-primary" id="booking-submit">Send message</button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
