<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAC Azerbaijan | Contact</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="contact">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">BAC Azerbaijan</a>
        <nav class="main-nav" id="main-nav"></nav>
        <div class="lang-switch" aria-label="Language switcher">
          <button data-lang="az">AZ</button>
          <button data-lang="en">EN</button>
          <button data-lang="ru">RU</button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container two-cols">
        <div>
          <h1 id="contact-title"></h1>
          <p id="contact-intro"></p>
          <p><strong id="contact-phone-label"></strong> +994 55 477 02 66</p>
          <p><strong id="contact-address-label"></strong> Aşıq Molla Cümə 3, Baku 1075, Azerbaijan</p>
          <p id="contact-note"></p>
        </div>
        <form class="card form">
          <label id="label-name"></label>
          <input type="text" />
          <label id="label-number"></label>
          <input type="text" />
          <label id="label-question"></label>
          <textarea rows="4"></textarea>
          <button type="button" class="btn btn-primary" id="send-btn"></button>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p id="footer-copy"></p>
        <div class="footer-links" id="footer-links"></div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
